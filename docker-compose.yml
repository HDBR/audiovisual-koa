version: "3.9"

services:
  web:
    image: nginx:alpine
    volumes:
      - /opt/stacks/audiovisual-koa/site:/usr/share/nginx/html:ro
    networks:
      - HDBRNET
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    deploy:
      replicas: 1
      update_config:
        order: start-first
        parallelism: 1
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.swarm.network=HDBRNET
        - traefik.http.routers.audiovisual-koa.rule=Host(`audiovisual.koaworld.org`)
        - traefik.http.routers.audiovisual-koa.entrypoints=websecure
        - traefik.http.routers.audiovisual-koa.tls=true
        - traefik.http.routers.audiovisual-koa.tls.certresolver=letsencrypt
        - traefik.http.services.audiovisual-koa.loadbalancer.server.port=80

networks:
  HDBRNET:
    external: true
